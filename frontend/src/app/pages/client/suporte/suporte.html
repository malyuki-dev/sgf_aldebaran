<div class="suporte-container">
  <h1 class="page-title">Como podemos ajudar?</h1>

  <div class="search-bar">
    <lucide-icon [img]="icons.search" size="20" class="search-icon"></lucide-icon>
    <input type="text" placeholder="Buscar dúvida ou assunto..." />
  </div>

  <section class="support-section">
    <h2 class="section-subtitle">CANAIS DE ATENDIMENTO</h2>
    <div class="channels-grid">
      <div class="channel-card">
        <div class="icon-circle green">
          <lucide-icon [img]="icons.whatsapp" size="24"></lucide-icon>
        </div>
        <div class="channel-info">
          <h3>WhatsApp</h3>
          <p>Resp. rápida</p>
        </div>
      </div>
      
      <div class="channel-card">
        <div class="icon-circle orange">
          <lucide-icon [img]="icons.chamado" size="24"></lucide-icon>
        </div>
        <div class="channel-info">
          <h3>Abrir Chamado</h3>
          <p>Relatar problema</p>
        </div>
      </div>

      <div class="channel-card">
        <div class="icon-circle blue">
          <lucide-icon [img]="icons.tutoriais" size="24"></lucide-icon>
        </div>
        <div class="channel-info">
          <h3>Tutoriais</h3>
          <p>Como usar</p>
        </div>
      </div>

      <div class="channel-card">
        <div class="icon-circle purple">
          <lucide-icon [img]="icons.historico" size="24"></lucide-icon>
        </div>
        <div class="channel-info">
          <h3>Histórico</h3>
          <p>Acompanhar</p>
        </div>
      </div>
    </div>
  </section>

  <section class="faq-section">
    <h2 class="section-subtitle">PERGUNTAS FREQUENTES</h2>
    <div class="faq-list">
      <div class="faq-item">
        <span>Preciso imprimir o comprovante?</span>
        <lucide-icon [img]="icons.chevron" size="20" class="chevron"></lucide-icon>
      </div>
      <div class="faq-item">
        <span>O que fazer se eu me atrasar?</span>
        <lucide-icon [img]="icons.chevron" size="20" class="chevron"></lucide-icon>
      </div>
      <div class="faq-item">
        <span>Esqueci minha senha de acesso</span>
        <lucide-icon [img]="icons.chevron" size="20" class="chevron"></lucide-icon>
      </div>
    </div>
  </section>
</div>
