<section class="client-placeholder">
  <div class="placeholder-card">
    <div class="placeholder-icon">
      <lucide-icon [img]="icons.sparkles" size="28"></lucide-icon>
    </div>

    <p class="placeholder-eyebrow">Portal do Cliente</p>
    <h2>{{ title }}</h2>
    <p class="placeholder-description">{{ description }}</p>

    <a routerLink="/client/perfil" class="placeholder-link">
      Voltar para Meu Perfil
      <lucide-icon [img]="icons.arrow" size="18"></lucide-icon>
    </a>
  </div>
</section>
