<div class="page-container">
    <!-- Seletor de Filial (Global) -->
    <div class="section-header-top">
        <div class="filial-selector-glass">
            <lucide-icon [img]="icons.building" size="18" class="text-blue"></lucide-icon>
            <label>Filial atual:</label>
            <select [(ngModel)]="selectedFilialId" (change)="onFilialChange()" class="filial-select-modern">
                <option [ngValue]="null">Configurações Gerais (Global)</option>
                <option *ngFor="let f of filiais" [ngValue]="f.id">{{ f.nome }}</option>
            </select>
            <div class="loading-dot" *ngIf="loading"></div>
        </div>
    </div>

    <div class="tabs-container">
        <div class="tabs-header">
            <a *ngFor="let tab of tabs" [routerLink]="tab.route" class="tab-btn" [class.active]="currentTab === tab.id">
                <lucide-icon [img]="tab.icon" size="18"></lucide-icon>
                {{ tab.label }}
            </a>
        </div>

        <div class="tab-content">
            <router-outlet></router-outlet>
        </div>
    </div>
</div>
