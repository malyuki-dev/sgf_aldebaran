 <div class="totem-container">

 

  <header>

    <div class="brand-area">

      <img src="assets/logo-aldebaran.png" alt="Aldebaran" class="brand-logo">

    </div>

    <div class="lang-switch">

      <div class="lang-option active">PT</div>

      <div class="lang-option">EN</div>

    </div>

  </header>


  <main class="main-content">

   

    <div class="center-wrapper">

     

      <div class="heading-group">

        <h1>Selecione a Categoria</h1>

        <p>Toque na opção correspondente</p>

      </div>


      <div class="cards-row">

       

        <div class="category-card"

             *ngFor="let cat of categorias"

             (click)="selecionarCategoria(cat)">

         

          <div class="icon-box">
            <lucide-icon [img]="cat.icone" [size]="56" class="totem-icon"></lucide-icon>
          </div>

         

          <h2>{{ cat.nome }}</h2>

          <p>{{ cat.descricao }}</p>

         

        </div>


      </div>


    </div>


    <div class="footer-action">

      <button class="btn-back" routerLink="/totem/tipo-atendimento">

        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

          <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>

        </svg>

        Voltar

      </button>

    </div>


  </main>

</div>
