<div class="admin-container">
  <!-- SIDEBAR -->
  <aside class="sidebar" [class.closed]="!sidebarOpen">
    <div class="logo-area">
      <img *ngIf="sidebarOpen" src="assets/logo-aldebaran.png" alt="Águas Aldebaran" class="logo-img" />
      <span *ngIf="!sidebarOpen" class="logo-mini">AL</span>
    </div>

    <nav class="menu">
      <ng-container *ngFor="let item of menuItems">
        <a *ngIf="!item.external" [routerLink]="item.path" routerLinkActive="active" class="menu-item">
          <lucide-icon [img]="icons[item.icon]"></lucide-icon>
          <span *ngIf="sidebarOpen">{{ item.label }}</span>
        </a>

        <a *ngIf="item.external" [routerLink]="item.path" class="menu-item totem-link" target="_blank">
          <lucide-icon [img]="icons[item.icon]"></lucide-icon>
          <span *ngIf="sidebarOpen">{{ item.label }}</span>
        </a>
      </ng-container>
    </nav>
  </aside>

  <!-- CONTEÚDO -->
  <div class="main-content-wrapper" [class.expanded]="!sidebarOpen">
    <!-- TOP BAR -->
    <header class="top-bar">
      <div class="top-bar-left">
        <button class="toggle-btn" (click)="toggleSidebar()">
          <lucide-icon [img]="icons['menu']"></lucide-icon>
        </button>
      </div>

      <div class="top-bar-right">
        <div class="user-info">
          <div class="avatar">
            <lucide-icon [img]="icons['user']"></lucide-icon>
          </div>
          <div class="text">
            <div class="name">{{ usuario?.nome || 'Administrador' }}</div>
            <div class="role">Admin</div>
          </div>
        </div>

        <button (click)="logout()" class="logout-btn" title="Sair do Sistema">
          <lucide-icon [img]="icons['logout']"></lucide-icon>
        </button>
      </div>
    </header>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
